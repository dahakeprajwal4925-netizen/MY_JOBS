<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div class="navbar">
    <h2>MY_JOBS</h2>
    <div>
        <a href="/">Home</a>
    </div>
</div>

<div class="container">

    <h2>Applications</h2>

    {% for app in apps %}
        <div class="job-card">
            <h3>{{ app.job_title }}</h3>
            <p>{{ app.first_name }} {{ app.last_name }}</p>
            <p>{{ app.email }}</p>
        </div>
    {% endfor %}

</div>
