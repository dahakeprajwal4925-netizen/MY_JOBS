
<!DOCTYPE html>
<html>
<head>
<h1>💼 MY_JOBS</h1>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f3f2ef;
            font-family: 'Segoe UI', sans-serif;
        }

        .hero {
            margin-top: 80px;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark px-4" style="background:#0a66c2;">
    <span class="navbar-brand">MyJobs</span>
    <div>
        <a href="/register/" class="text-white me-3">Join Now</a>
        <a href="/dashboard/" class="text-white">Dashboard</a>
    </div>
</nav>

<div class="container hero">
    <div class="row align-items-center">

        <div class="col-md-6">
            <h1 class="fw-bold">
                Welcome to your professional community
            </h1>
            <p class="text-muted">
                Find jobs, connect, and grow your career.
            </p>
        </div>

        <div class="col-md-6">
            <div class="form-box shadow-sm">

                <h4>Apply for Job</h4>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-primary w-100">
                        Apply Now
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

</body>
</html>
{% if messages %}
<script>
    alert("Application submitted successfully!");
</script>
{% endif %}
