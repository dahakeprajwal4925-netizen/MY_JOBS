
<!DOCTYPE html>
<html>
<head>
    <title>Login | MY_JOBS</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: #f3f2ef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #0a66c2;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0a66c2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #004182;
        }

        .link {
            margin-top: 15px;
            display: block;
            color: #0a66c2;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <div class="logo">💼 MY_JOBS</div>

    <h2>Sign in</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.username }}
        {{ form.password }}

        <button type="submit">Sign in</button>
    </form>

    <a href="/register/" class="link">New user? Register</a>
</div>

</body>
</html>
