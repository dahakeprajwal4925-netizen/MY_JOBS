<!DOCTYPE html>
<html>
<head>
    <title>Register - Myjob Enterprise</title>
    <style>
        body {
            font-family: Arial;
            background: #f3f2ef;
        }
        .box {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        h2 {
            text-align: center;
            color: #0a66c2;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #0a66c2;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>

</div>

</body>
</html>
